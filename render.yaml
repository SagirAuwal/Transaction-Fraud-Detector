services:
  - type: web
    name: gojo-sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10
