services:
  - type: web
    name: gojo-sentinel
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        sync: false # You will paste the Supabase link in the Render dashboard
      - key: API_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.10.0
